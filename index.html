<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEC — نظام إدارة التصنيع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12161d; --panel:#1a2029; --panel-2:#212836; --panel-3:#262e3d; --line:#323c4d;
  --text:#e9edf3; --text-dim:#8a94a6; --text-faint:#5c6779;
  --accent:#ff6a3d; --accent-dim:#ff6a3d22;
  --amber:#ffb84d; --amber-dim:#ffb84d22;
  --good:#43b581; --good-dim:#43b58122;
  --bad:#ef5966; --bad-dim:#ef596622;
  --blue:#5aa3ec; --blue-dim:#5aa3ec22;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;font-size:14px;}
h1,h2,h3,.display{font-family:'Cairo',sans-serif;}
.mono{font-family:'JetBrains Mono',monospace;}
::selection{background:var(--accent);color:#fff;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

.shell{display:flex;min-height:100vh;}
.sidebar{width:238px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.brand{padding:20px 18px 16px;border-bottom:1px solid var(--line);position:relative;overflow:hidden;}
.brand-stripes{position:absolute;inset:0;opacity:.10;background:repeating-linear-gradient(-45deg,var(--accent) 0 10px,transparent 10px 20px);pointer-events:none;}
.brand h1{font-size:19px;margin:0 0 2px;font-weight:900;letter-spacing:.5px;position:relative;}
.brand h1 span{color:var(--accent);}
.brand p{margin:0;color:var(--text-dim);font-size:11.5px;position:relative;}
.nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;}
.nav-label{font-size:10.5px;color:var(--text-faint);padding:10px 10px 4px;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--text-dim);font-weight:500;font-size:13.5px;border:1px solid transparent;transition:.12s;user-select:none;}
.nav-item:hover{background:var(--panel-2);color:var(--text);}
.nav-item.active{background:var(--accent-dim);color:var(--accent);border-color:#ff6a3d40;font-weight:700;}
.nav-icon{width:18px;text-align:center;font-size:15px;}
.nav-count{margin-right:auto;background:var(--panel-3);color:var(--text-dim);font-size:10.5px;padding:1px 7px;border-radius:20px;font-family:'JetBrains Mono',monospace;}
.nav-item.active .nav-count{background:var(--accent);color:#fff;}
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--line);color:var(--text-faint);font-size:10.5px;line-height:1.6;}
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{padding:16px 26px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;background:var(--bg);position:sticky;top:0;z-index:20;}
.topbar h2{margin:0;font-size:19px;font-weight:800;}
.topbar .sub{color:var(--text-dim);font-size:12.5px;margin-top:2px;}
.spacer{flex:1;}
.search{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;width:200px;font-family:'Tajawal',sans-serif;}
.search:focus{outline:none;border-color:var(--accent);}
select.filter{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--text-dim);font-size:12.5px;font-family:'Tajawal',sans-serif;}
.btn{border:none;border-radius:8px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Tajawal',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:.12s;white-space:nowrap;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-accent:hover{background:#ff7d54;}
.btn-ghost{background:var(--panel-2);color:var(--text-dim);border:1px solid var(--line);}
.btn-ghost:hover{color:var(--text);border-color:var(--text-faint);}
.btn-sm{padding:5px 10px;font-size:11.5px;border-radius:6px;}
.btn-icon{padding:6px 9px;}
.btn-danger{background:var(--bad-dim);color:var(--bad);}
.btn-danger:hover{background:var(--bad);color:#fff;}
.content{padding:22px 26px 60px;overflow-y:auto;}

.grid-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;right:0;bottom:0;width:3px;background:var(--accent-c,var(--accent));}
.card .k{color:var(--text-dim);font-size:11.5px;font-weight:700;margin-bottom:8px;}
.card .v{font-family:'Cairo',sans-serif;font-size:26px;font-weight:800;}
.card .d{color:var(--text-faint);font-size:11px;margin-top:4px;}
.panels-2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;align-items:start;}
@media(max-width:980px){.panels-2{grid-template-columns:1fr;}}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
.panel h3{margin:0 0 14px;font-size:14.5px;display:flex;align-items:center;gap:8px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12.5px;}
.bar-label{width:110px;color:var(--text-dim);flex-shrink:0;}
.bar-track{flex:1;height:8px;background:var(--panel-3);border-radius:20px;overflow:hidden;}
.bar-fill{height:100%;border-radius:20px;}
.bar-val{width:26px;text-align:left;font-family:'JetBrains Mono',monospace;color:var(--text-dim);}
.activity-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px;}
.activity-item:last-child{border:none;}
.act-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.act-text b{color:var(--text);}
.act-text{color:var(--text-dim);}
.act-time{color:var(--text-faint);font-size:11px;margin-top:1px;}

.table-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:right;padding:11px 14px;color:var(--text-faint);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--line);background:var(--panel-2);font-weight:700;white-space:nowrap;}
tbody td{padding:11px 14px;border-bottom:1px solid var(--line);color:var(--text);white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--panel-2);cursor:pointer;}
.id-tag{font-family:'JetBrains Mono',monospace;color:var(--text-dim);font-size:11.5px;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.row-actions{display:flex;gap:6px;}
.empty-state{padding:60px 20px;text-align:center;color:var(--text-faint);}
.empty-state .big{font-size:34px;margin-bottom:10px;}
.empty-state h4{color:var(--text-dim);margin:0 0 4px;font-family:'Cairo',sans-serif;}

.overlay{position:fixed;inset:0;background:#0009;backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;overflow-y:auto;}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:640px;max-width:100%;max-height:88vh;display:flex;flex-direction:column;margin:auto;}
.modal-lg{width:920px;}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;}
.modal-head h3{margin:0;font-size:16px;}
.modal-body{padding:20px 22px;overflow-y:auto;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-start;flex-wrap:wrap;}
.close-x{margin-right:auto;background:none;border:none;color:var(--text-faint);font-size:20px;cursor:pointer;line-height:1;}
.close-x:hover{color:var(--text);}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field.full{grid-column:1/-1;}
.field label{font-size:12px;color:var(--text-dim);font-weight:700;}
.field label .req{color:var(--accent);}
.field input,.field select,.field textarea{background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:9px 11px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:13.5px;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
.field textarea{resize:vertical;min-height:60px;font-family:'Tajawal',sans-serif;}
.computed-box{grid-column:1/-1;background:var(--panel-3);border:1px dashed var(--line);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center;}
.computed-box b{color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:16px;}
.section-title{font-size:12.5px;font-weight:800;color:var(--accent);margin:4px 0 2px;padding-bottom:6px;border-bottom:1px solid var(--line);grid-column:1/-1;text-transform:uppercase;letter-spacing:.5px;}
.confirm-box{width:360px;}
.confirm-box .modal-body{text-align:center;padding:26px 22px 6px;}
.confirm-box .modal-foot{justify-content:center;}
#loginScreen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 20%,var(--panel-2),var(--bg) 70%);padding:20px;}
.login-card{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:32px 28px;box-shadow:0 20px 60px #0006;}
.login-card .brand-lg{text-align:center;margin-bottom:22px;}
.login-card .brand-lg h1{font-size:34px;letter-spacing:1px;color:var(--text);}
.login-card .brand-lg h1 span{color:var(--accent);}
.login-card .brand-lg p{color:var(--text-faint);font-size:13px;margin-top:4px;}
.login-card .field{margin-bottom:14px;}
.login-card label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px;}
.login-card input{width:100%;}
.login-card .btn{width:100%;justify-content:center;margin-top:8px;}
.login-err{color:var(--bad);font-size:13px;text-align:center;min-height:18px;margin-top:6px;}
.login-foot-link{text-align:center;margin-top:16px;font-size:12px;color:var(--text-faint);cursor:pointer;text-decoration:underline;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--panel-3);border:1px solid var(--line);border-right:3px solid var(--good);padding:12px 20px;border-radius:8px;font-size:13px;z-index:200;box-shadow:0 8px 24px #0006;opacity:0;transition:.25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

.print-sheet{background:#fff;color:#111;border-radius:10px;padding:0;overflow:hidden;}
.print-sheet .ph{background:var(--accent);color:#fff;padding:18px 24px;}
.print-sheet .ph h2{margin:0;font-family:'Cairo',sans-serif;}
.print-sheet .ph p{margin:2px 0 0;opacity:.9;font-size:12px;}
.print-sheet .pb{padding:22px 24px;}
.print-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed #ddd;font-size:13.5px;}
.print-row span:first-child{color:#777;}
.print-row span:last-child{font-weight:700;}
.print-total{margin-top:14px;background:#f4f1ea;border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;font-weight:800;}
.print-sign{margin-top:34px;display:flex;justify-content:space-between;font-size:12px;color:#777;}
.print-sign div{border-top:1px solid #ccc;padding-top:6px;width:140px;text-align:center;}
.print-bom-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12.5px;}
.print-bom-table th{background:#f4f1ea;text-align:right;padding:6px 8px;}
.print-bom-table td{padding:6px 8px;border-bottom:1px solid #eee;}
@media print{ body *{visibility:hidden;} #printArea,#printArea *{visibility:visible;} #printArea{position:fixed;inset:0;background:#fff;} }

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap;}
.tab-btn{padding:9px 16px;background:none;border:none;color:var(--text-dim);font-weight:700;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;font-family:'Tajawal',sans-serif;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.spec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
.spec-item{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;}
.spec-item .l{font-size:11px;color:var(--text-faint);margin-bottom:4px;}
.spec-item .v{font-weight:700;font-family:'JetBrains Mono',monospace;font-size:13.5px;}
.info-note{background:var(--blue-dim);border:1px solid #5aa3ec40;color:var(--blue);border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:16px;}

.db-cat{margin-bottom:26px;}
.db-cat h4{margin:0 0 10px;font-size:14px;display:flex;align-items:center;gap:8px;}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel-3);border:1px solid var(--line);border-radius:20px;padding:5px 6px 5px 12px;font-size:12.5px;margin:0 4px 8px 0;}
.chip button{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:13px;width:20px;height:20px;border-radius:50%;line-height:1;}
.chip button:hover{background:var(--bad-dim);color:var(--bad);}
.mini-add{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
.mini-add input,.mini-add select{background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:7px 10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:12.5px;}
.mini-add input{flex:1;min-width:100px;}

.mobile-toggle{display:none;}
@media(max-width:860px){
  .sidebar{position:fixed;right:0;top:0;z-index:90;transform:translateX(100%);transition:.2s;}
  .sidebar.open{transform:translateX(0);}
  .mobile-toggle{display:inline-flex;}
  .form-grid{grid-template-columns:1fr;}
  .search{width:120px;}
  .modal-lg{width:100%;}
}
</style>
</head>
<body>
<div id="loginScreen" style="display:none">
  <div class="login-card">
    <div class="brand-lg"><h1>M<span>E</span>C</h1><p>نظام إدارة التصنيع — تسجيل الدخول</p></div>
    <div class="field"><label>اسم المستخدم</label><input id="loginUser" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()"></div>
    <div class="field"><label>كلمة المرور</label><input id="loginPass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-err" id="loginErr"></div>
    <button class="btn btn-accent" onclick="doLogin()">دخول</button>
    <div class="login-foot-link" onclick="openChangePasswordModal(true)">نسيت كلمة المرور / تغييرها</div>
  </div>
</div>
<div class="shell" id="appShell" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="brand-stripes"></div>
      <h1>M<span>E</span>C</h1>
      <p>نظام إدارة التصنيع — محرك حسابات هندسي</p>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">بيانات مشتركة لكل الفريق · تُحفظ تلقائيًا · محرك الحسابات مبني على معادلات ملفكم الأصلي
      <div style="margin-top:10px;display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="openChangePasswordModal(false)">🔑 كلمة المرور</button>
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="doLogout()">⏻ خروج</button>
      </div>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="btn btn-ghost btn-icon mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <div><h2 id="viewTitle">لوحة التحكم</h2><div class="sub" id="viewSub">نظرة عامة على حالة المصنع</div></div>
      <div class="spacer"></div>
      <input type="text" class="search" id="searchBox" placeholder="بحث..." oninput="onSearch(this.value)" style="display:none">
      <select class="filter" id="statusFilter" onchange="onFilter(this.value)" style="display:none"></select>
      <button class="btn btn-ghost" id="exportBtn" onclick="exportCSV()" style="display:none">⤓ تصدير</button>
      <button class="btn btn-accent" id="addBtn" onclick="onAddClick()" style="display:none">+ إضافة</button>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>

    50:{weightPerMeter:22.61, plateWeight:10.21},

  pallets:[35,40,45,50],
  motorTypes:['منتصف','اسطواني'],

/* ============================================================
   CALCULATION ENGINE (ported from "Calculations" + "bill of quantity" sheets)
   ============================================================ */
function EVEN(x){ return x>=0 ? Math.ceil(x/2)*2 : Math.floor(x/2)*2; }
function ODD(x){ const c=Math.ceil(x); return c%2===0? c+1 : c; }
function r1(x){ return Math.round(x*10)/10; }
function r3(x){ return Math.round(x*1000)/1000; }

function findSlat(name){ return CDB.slatTypes.find(s=>s.name===name); }
function findGuide(name){ return CDB.guideTypes.find(g=>g.name===name); }

function autoPalletSize(slat, height, rollDir){
  const IN = rollDir === 'داخل';
  switch(slat.palletGroup){
    case 'A': return (IN && height<350) ? 40 : 45;
    case 'B': return IN ? (height<300?40:45) : (height<260?40:45);
    case 'C': return height<280?35:height<380?40:height<550?45:50;
    case 'D': return height<310?35:height<400?40:height<500?45:50;
    case 'E': return IN ? (height<300?40:height<500?45:50) : (height<260?40:height<440?45:50);
    case 'F': return height<350?40:45;
    case 'G': return height<350?40:height<500?45:50;
    default: return 40;
  }
}
function railOpening(slat, rubberType){
  if(['M3','M18','M19'].includes(slat.key)) return rubberType==='كاوتش مسلح'?4:4.5;
  const map = {M4:4,M5:4,M6:3,M7:3,M8:3,M9:3,M10:3,M11:3,M12:3,M13:5,M14:3,M15:3,M16:3,M17:3,M20:3};
  return map[slat.key] ?? 3;
}
function pipeDiameter(safetyBreak, motorType, pipeLength, slatKey){
  if(safetyBreak==='يوجد') return {mm:193,label:'اسطواني 193 مم'};
  if(motorType==='منتصف') return {mm:50,label:'منتصف 50 مم'};
  if(slatKey==='M3') return {mm:159,label:'اسطواني 159 مم'};
  if(['M13','M16'].includes(slatKey)) return pipeLength<=700? {mm:139,label:'اسطواني 139 مم'} : {mm:193,label:'اسطواني 193 مم'};
  return pipeLength<=700? {mm:139,label:'اسطواني 139 مم'} : {mm:168,label:'اسطواني 168 مم'};
}
function motorOpeningLabel(mm){ return ({139:'فتحة 15 سم',159:'فتحة 17 سم',168:'فتحة 17 سم',193:'فتحة 20 سم',50:''})[mm] || ''; }

function runCalc(o){
  const slat = findSlat(o.slatType), guide = findGuide(o.guideType);
  if(!slat || !guide) return null;
  const width=Number(o.width)||0, height=Number(o.height)||0, dc=Number(o.doorCount)||1;
  const pipeLength = width - (o.motorType==='منتصف' ? 1.5 : 3);
  const curtainWidth = width - (o.seal==='عادي' ? 4 : o.seal==='end lock' ? 6 : (['M3','M18','M19'].includes(slat.key) ? 12 : 6));
  const doorWeight = r3(height * curtainWidth * slat.weightSqm * 1e-4);
  const slatCount = Math.ceil((height - slat.badi) / slat.width);
  const badiCount = slat.rib ? slatCount - 1 : null;

  let bracketInitial, bracketFinal, bracketSpacing;
  if(o.motorType==='منتصف'){
    bracketInitial = EVEN(doorWeight/30);
    bracketFinal = ((pipeLength-70)/(bracketInitial-1))<35 ? bracketInitial-2 : bracketInitial;
    bracketSpacing = r1((pipeLength-110)/bracketInitial);
  } else {
    bracketInitial = ODD(((pipeLength-70)/50)+2);
    bracketFinal = ((pipeLength-70)/(bracketInitial-1))<35 ? bracketInitial-2 : bracketInitial;
    bracketSpacing = r1((pipeLength-70)/(bracketFinal-1));
  }
  const cableLength = height<=315?'3.5 متر':height<=365?'4 متر':'5 متر';
  const diameter = pipeDiameter(o.safetyBreak, o.motorType, pipeLength, slat.key);
  const palletSize = o.palletOverride ? Number(o.palletOverride) : autoPalletSize(slat, height, o.rollDirection);
  const boxLength = height - palletSize;
  const railLength = boxLength + 5;
  const opening = railOpening(slat, o.rubberType);
  const bracketQty = dc*bracketFinal;

  return {slat,guide,pipeLength:r1(pipeLength),curtainWidth:r1(curtainWidth),doorWeight,slatCount,badiCount,
    bracketInitial,bracketFinal,bracketSpacing,bracketQty,cableLength,diameter,palletSize,boxLength,railLength,opening,doorCount:dc};
}
function bracketMaterial(motorType, slatKey){
  const isFlatAlum = ['M15','M16'].includes(slatKey);
  if(motorType==='منتصف') return isFlatAlum? 'ماشات حديد':'ماشات صاج';
  return isFlatAlum? 'ماشات الومينيوم فلات':'ماشات بومبيه';
}
function housingBoxName(size, motorType){
  const plain = 'علبة حافظة '+size+'*'+size, plated = plain+' بالطبات';
  if(motorType==='اسطواني') return size===40 ? plain : plated;
  return plain;
}
function buildBOM(o, calc){
  const dc = calc.doorCount, slat = calc.slat, guide = calc.guide;
  const items = [];
  items.push({name:'القوائم', description: guide.boxType
    ? `${guide.name} طول العلبة ${calc.boxLength} طول المجرى ${calc.railLength}`
    : `${guide.name} طول ${calc.boxLength}`, qty: dc*2, unit:'قطعة'});

  const motorSide = o.motorType==='منتصف'
    ? `باليتة ${calc.palletSize}*${calc.palletSize} منتصف`
    : `باليتة ${calc.palletSize}*${calc.palletSize} موتور ${motorOpeningLabel(calc.diameter.mm)}`;
  const secondSide = o.motorType==='اسطواني' ? `باليتة ${calc.palletSize}*${calc.palletSize} رومان بلي فتحة 7 سم` : '';
  items.push({name:'الباليتة', description: secondSide? `${motorSide} & ${secondSide}` : motorSide, qty: dc, unit:'طقم'});

  if(o.housingBox==='يوجد') items.push({name:'العلبة الحافظة', description: housingBoxName(calc.palletSize, o.motorType), qty: dc, unit:'قطعة'});
  items.push({name:'الماسورة', description:`ماسورة ${calc.diameter.label} طول ${calc.pipeLength}`, qty: dc, unit:'قطعة'});

  if(o.motorType==='منتصف'){
    // بند وصفي: عدد الزمبلكات + حجم الزمبلك حسب فئة الارتفاع (يقابل صف 10 في bill of quantity)
    items.push({name:'الزمبلك والطنابير', description:`${calc.bracketFinal} طنابير+زمبلكات ${calc.cableLength}`, qty: dc, unit:'طقم'});
  }
  // بند قابل للعد دائمًا (يقابل صف 11 — ينطبق على النوعين، بنفس عدد الزمبلك/الماشات النهائي)
  items.push({name:'الماشات', description:`${bracketMaterial(o.motorType,slat.key)}${o.motorType==='اسطواني'?` , ${calc.bracketSpacing} سم`:''}`, qty: calc.bracketQty, unit:'قطعة'});
  items.push({name:'اكس ماسورة اسطواني', description:'يُحدَّد يدويًا حسب الموقع', qty:null, manual:true, unit:'قطعة'});
  items.push({name:'مسمار هيلتي', description:'مسمار هيلتي 10سم', qty:16*dc, unit:'قطعة'});
  items.push({name:'مسمار فيشر 10 مم', description:'مسمار فيشر 10 مم', qty:10*dc, unit:'قطعة'});
  items.push({name:'فيشر 10 مم', description:'فيشر 10 مم', qty:10*dc, unit:'قطعة'});

  let q1040=0, q1020=0;
  if(o.motorType==='اسطواني'){
    q1040 = calc.bracketQty+1; items.push({name:'مسمار 10*40 راس مفتاح', description:'مسمار 10*40', qty:q1040, unit:'قطعة'});
    q1020 = dc; items.push({name:'مسمار 10*20 راس مفتاح', description:'مسمار 10*20', qty:q1020, unit:'قطعة'});
    items.push({name:'مسمار 8*30 الين', description:'مسمار 8*30 الين', qty:13*dc, unit:'قطعة'});
    items.push({name:'رولمان بلي/سيفتي بريك', description: o.safetyBreak==='يوجد'?'سيفتي بريك':'رولمان بلي', qty: dc, unit:'قطعة'});
    items.push({name:'مسمار 12*40', description:'مسمار 12*40', qty:2*dc, unit:'قطعة'});
    items.push({name:'صامولة 12', description:'صامولة 12', qty:2*dc, unit:'قطعة'});
  } else {
    q1040 = 2*dc; items.push({name:'مسمار 10*40 راس مفتاح', description:'مسمار 10*40', qty:q1040, unit:'قطعة'});
    items.push({name:'مسمار 10*100', description:'مسمار 10*100', qty:2*dc, unit:'قطعة'});
    items.push({name:'مسمار 10*40 الين', description:'مسمار 10*40', qty:2*dc, unit:'قطعة'});
    items.push({name:'ريب موتور', description:'ريب موتور', qty: dc, unit:'قطعة'});
    items.push({name:'دواسة باب', description:'دواسة باب بالمسامير والصواميل', qty: 2*dc, unit:'قطعة'});
  }
  items.push({name:'وردة عريضة', description:'وردة 10 عريضة', qty:q1040+q1020, unit:'قطعة'});
  items.push({name:'تاتش اب', description:`تاتش اب ${o.paintColor||''}`, qty:1, unit:'علبة'});
  items.push({name:'كاوتش', description: o.rubberType, qty: (guide.boxType? calc.railLength: calc.boxLength) * 4 * dc, unit:'سم'});
  items.push({name:'زاوية تثبيت', description:'زاوية تثبيت 3 م', qty: dc, unit:'قطعة'});
  return items;
}
function paintWeightEstimate(o, calc){
  const guideWeight = calc.guide.weightPerMeter * calc.boxLength * 0.01 * (calc.doorCount*2);
  const curtainWeight = calc.doorWeight * calc.doorCount;
  let boxWeight = 0;
  if(o.housingBox==='يوجد'){
    const hb = CDB.housingBoxes[calc.palletSize];
    if(hb){
      boxWeight = hb.weightPerMeter * (Number(o.width)+20) * 0.01;
      if(!(o.motorType==='اسطواني' && calc.palletSize===40)) boxWeight += hb.plateWeight;
      boxWeight *= calc.doorCount;
    }
  }
  return r3(guideWeight + curtainWeight + boxWeight);
}

const LS_PREFIX = 'mec_factory_v1_';
const HAS_ARTIFACT_STORAGE = (typeof window !== 'undefined' && !!window.storage);
async function storeGet(key, fallback){
  // المصدر الأساسي: تخزين المتصفح المحلي — يضمن بقاء البيانات بعد إغلاق الملف وإعادة فتحه
  try{
    const raw = localStorage.getItem(LS_PREFIX+key);
    if(raw !== null) return JSON.parse(raw);
  }catch(e){ /* تجاهل ومحاولة المصدر الثاني */ }
  if(HAS_ARTIFACT_STORAGE){
    try{
      const r = await window.storage.get(key, true);
      if(r){ try{ localStorage.setItem(LS_PREFIX+key, r.value); }catch(e){} return JSON.parse(r.value); }
    }catch(e){ /* لا يوجد بيانات بعد */ }
  }
  return fallback;
}
async function storeSet(key, value){
  const json = JSON.stringify(value);
  let localOk = false;
  try{ localStorage.setItem(LS_PREFIX+key, json); localOk = true; }catch(e){ console.error('local storage error', e); }
  if(HAS_ARTIFACT_STORAGE){ try{ await window.storage.set(key, json, true); }catch(e){ /* تجاهل */ } }
  if(!localOk) showToast('تعذر الحفظ محليًا — تحقق من إعدادات المتصفح (وضع التصفح الخاص يمنع الحفظ)', true);
}

const APPROVAL_STATUSES = ['بانتظار الاعتماد','معتمد','مرفوض'];
const APPROVAL_COLOR = {'بانتظار الاعتماد':'amber','معتمد':'good','مرفوض':'bad'};
const APPROVAL_LABELS = {orders:'أمر التصنيع', paints:'إذن الدهان', purchases:'طلب الشراء', supplies:'إذن التوريد'};
// الحالات التي تتطلب اعتمادًا مسبقًا قبل السماح بها لكل وحدة
const GATED_STATUSES = {
  orders: ['قيد التصنيع','مكتمل'],
  paints: ['قيد التنفيذ','مكتمل'],
  purchases: ['تم الطلب','تم الاستلام'],
  supplies: ['تم التسليم'],
};
function approvalOf(r){ return (r && r.approvalStatus) || 'بانتظار الاعتماد'; }
function approvalBadgeHtml(r){ return statusBadgeHtml(approvalOf(r), APPROVAL_COLOR); }
function checkApprovalGate(modKey, existingRecord, newStatus){
  const gated = GATED_STATUSES[modKey];
  if(!gated || !newStatus || !gated.includes(newStatus)) return true;
  if(approvalOf(existingRecord)==='معتمد') return true;
  showToast('لا يمكن ضبط الحالة على "'+newStatus+'" قبل اعتماد '+(APPROVAL_LABELS[modKey]||'السجل')+' من المسؤول المختص', true);
  return false;
}
function openApprovalModal(modKey, id){
  const r = STATE[modKey].find(x=>x.id===id); if(!r) return;
  const label = APPROVAL_LABELS[modKey] || modKey;
  const cur = approvalOf(r);
  const historyNote = r.approvedBy
    ? `<br>بواسطة: <b>${r.approvedBy}</b> — ${new Date(r.approvedAt).toLocaleString('ar-EG')}${cur==='مرفوض' && r.rejectionReason ? `<br>سبب الرفض: ${r.rejectionReason}` : ''}`
    : '';
  const modal = `<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()">
    <div class="modal">
      <div class="modal-head"><h3>🛡 اعتماد — ${label} ${r.id}</h3><button class="close-x" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="info-note">الحالة الحالية: ${approvalBadgeHtml(r)}${historyNote}</div>
        <div class="form-grid" style="margin-top:14px">
          <div class="field full"><label>اسم المعتمد<span class="req"> *</span></label><input id="f_approverName" value="${r.approvedBy||''}" placeholder="اسم المسؤول المختص بالاعتماد"></div>
          <div class="field full"><label>ملاحظة (مطلوبة عند الرفض)</label><textarea id="f_approvalNote">${cur==='مرفوض' ? (r.rejectionReason||'') : ''}</textarea></div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-accent" onclick="submitApproval('${modKey}','${id}','approve')">✔ اعتماد</button>
        <button class="btn btn-danger" onclick="submitApproval('${modKey}','${id}','reject')">✕ رفض</button>
        <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      </div>
    </div></div>`;
  document.getElementById('modalRoot').innerHTML = modal;
}
async function submitApproval(modKey, id, decision){
  const r = STATE[modKey].find(x=>x.id===id); if(!r) return;
  const name = document.getElementById('f_approverName').value.trim();
  const note = document.getElementById('f_approvalNote').value.trim();
  if(!name){ showToast('برجاء إدخال اسم المعتمد', true); return; }
  if(decision==='reject' && !note){ showToast('برجاء إدخال سبب الرفض', true); return; }
  r.approvalStatus = decision==='approve' ? 'معتمد' : 'مرفوض';
  r.approvedBy = name;
  r.approvedAt = Date.now();
  r.rejectionReason = decision==='reject' ? note : '';
  await storeSet(modKey, STATE[modKey]);
  closeModal();
  showToast(decision==='approve' ? ('تم اعتماد '+(APPROVAL_LABELS[modKey]||modKey)+' '+id) : ('تم رفض '+(APPROVAL_LABELS[modKey]||modKey)+' '+id));
  render();
}

function aggregateDemand(){
  const agg = {};
  STATE.orders.forEach(o=>{
    if(o.status==='ملغي' || !o.bom) return;
    o.bom.forEach(it=>{
      if(it.qty===null) return;
      if(!agg[it.name]) agg[it.name] = {name:it.name, unit:it.unit, needed:0};
      agg[it.name].needed += Number(it.qty)||0;
    });
  });
  Object.keys(agg).forEach(name=>{
    const st = STATE.stock[name] || {onHand:0, threshold:0};
    agg[name].onHand = st.onHand||0;
    agg[name].shortfall = Math.max(0, agg[name].needed - (st.onHand||0));
  });
  return agg;
}
function renderDashboard(){
  const c=document.getElementById('content');
  const activeOrders = STATE.orders.filter(o=>o.status==='قيد التصنيع').length;
  const pendingPurchaseValue = STATE.purchases.filter(p=>p.status!=='تم الاستلام'&&p.status!=='ملغي').reduce((s,p)=>s+Number(p.qty||0)*Number(p.unitPrice||0),0);
  const agg = aggregateDemand();
  const shortfalls = Object.values(agg).filter(a=>a.shortfall>0).length;
  const pendingSupplies = STATE.supplies.filter(s=>s.status==='معلق').length;
  const pendingApprovals = [...STATE.orders,...STATE.paints,...STATE.purchases,...STATE.supplies].filter(r=>approvalOf(r)==='بانتظار الاعتماد').length;

  const cards=[
    {k:'أوامر تصنيع قيد التنفيذ', v:activeOrders, d:STATE.orders.length+' إجمالي الأوامر', color:'var(--blue)'},
    {k:'قيمة طلبات الشراء المعلقة', v:fmtMoney(pendingPurchaseValue), d:STATE.purchases.length+' طلب شراء مسجل', color:'var(--accent)'},
    {k:'مكونات ناقصة عن الاحتياج', v:shortfalls, d:'من إجمالي أوامر التصنيع النشطة', color:'var(--amber)'},
    {k:'اذون توريد معلقة', v:pendingSupplies, d:STATE.supplies.length+' إذن توريد إجمالي', color:'var(--bad)'},
    {k:'بانتظار الاعتماد', v:pendingApprovals, d:'عبر كل الأوامر والأذون والطلبات', color:'var(--amber)'},
  ];
  let html='<div class="grid-cards">'+cards.map(c=>`<div class="card" style="--accent-c:${c.color}"><div class="k">${c.k}</div><div class="v">${c.v}</div><div class="d">${c.d}</div></div>`).join('')+'</div>';

  const statusCounts={}; ['معلق','قيد التصنيع','مكتمل','ملغي'].forEach(s=>statusCounts[s]=0);
  STATE.orders.forEach(o=>{ if(statusCounts[o.status]===undefined) statusCounts[o.status]=0; statusCounts[o.status]++; });
  const total=STATE.orders.length||1;
  const colorMap={amber:'var(--amber)',blue:'var(--blue)',good:'var(--good)',bad:'var(--bad)'};
  const orderColors={'معلق':'amber','قيد التصنيع':'blue','مكتمل':'good','ملغي':'bad'};
  let bars=Object.entries(statusCounts).map(([s,n])=>{
    const col=colorMap[orderColors[s]]||'var(--text-faint)'; const pct=Math.round(n/total*100);
    return `<div class="bar-row"><div class="bar-label">${s}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div><div class="bar-val">${n}</div></div>`;
  }).join('');

  let all=[];
  STATE.orders.forEach(r=>all.push({...r,_mod:'أوامر التصنيع',_icon:'⚙',_label:r.client}));
  STATE.paints.forEach(r=>all.push({...r,_mod:'اذون الدهان',_icon:'🎨',_label:r.itemDesc}));
  STATE.purchases.forEach(r=>all.push({...r,_mod:'طلبات الشراء',_icon:'🛒',_label:r.itemName}));
  STATE.supplies.forEach(r=>all.push({...r,_mod:'اذون التوريد',_icon:'🚚',_label:r.itemName}));
  all.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)); all=all.slice(0,8);
  let activity = all.length ? all.map(r=>`<div class="activity-item"><span class="act-dot" style="background:var(--text-faint)"></span>
      <div><div class="act-text">${r._icon} <b>${r._mod}</b> — ${r._label||''}</div><div class="act-time">${r.id} · ${timeAgo(r.createdAt||Date.now())}</div></div></div>`).join('')
      : '<div class="empty-state" style="padding:30px 0"><div class="big">🗂</div>لا يوجد نشاط بعد</div>';

  html += `<div class="panels-2"><div class="panel"><h3>⚙ حالة أوامر التصنيع</h3>${bars}</div><div class="panel"><h3>🕓 آخر النشاطات</h3>${activity}</div></div>`;

async function saveOrder(){
  const defs = orderFieldDefs().filter(f=>!f.section);
  const missing = defs.filter(f=>f.req && !document.getElementById('f_'+f.key).value.trim());
  if(missing.length){ showToast('برجاء تعبئة: '+missing.map(f=>f.label).join('، '), true); return; }
  const o = collectOrderForm();
  const existing = editingId ? STATE.orders.find(r=>r.id===editingId) : null;
  if(!checkApprovalGate('orders', existing, o.status)) return;
  const calc = runCalc(o);
  if(!calc){ showToast('تعذر حساب المواصفات — تحقق من نوع الشريحة والقوائم', true); return; }
  const bom = buildBOM(o, calc);
  let record = existing || {id: nextId('MO'), createdAt: Date.now(), approvalStatus:'بانتظار الاعتماد'};
  Object.assign(record, o, {calc, bom});
  if(!editingId) STATE.orders.push(record);
  await storeSet('orders', STATE.orders);
  closeModal(); showToast(editingId?'تم حفظ التعديلات':'تم إصدار أمر التصنيع '+record.id+' وحساب المستلزمات'); render();
}

function exportOrderCSV(id){

  (o.bom||[]).forEach(it=>{ csv += [it.name,'"'+String(it.description||'').replace(/"/g,'""')+'"', it.qty===null?'يدوي':it.qty, it.unit||''].join(',')+'\n'; });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=id+'_مستلزمات.csv'; a.click(); URL.revokeObjectURL(url);
}

function pullOrderWeight(){
  const orderId = document.getElementById('f_linkedOrder').value;
  const o = STATE.orders.find(x=>x.id===orderId);
  if(!o || !o.calc) return;
  const w = paintWeightEstimate(o, o.calc);
  document.getElementById('f_totalWeightKg').value = w;
  document.getElementById('f_itemDesc').value = 'دهان أبواب — '+o.client;
  updatePaintLive();
}
function updatePaintLive(){
  const w = Number(document.getElementById('f_totalWeightKg')?.value||0);
  const p = Number(document.getElementById('f_paintPricePerKg')?.value||0);
  const el = document.getElementById('paintLiveVal'); if(el) el.textContent = fmtMoney(w*p);
}
async function savePaint(){
  const itemDesc = document.getElementById('f_itemDesc').value.trim();
  const date = document.getElementById('f_date').value;
  if(!itemDesc || !date){ showToast('برجاء تعبئة البيان والتاريخ', true); return; }
  const existing = editingId ? STATE.paints.find(r=>r.id===editingId) : null;
  const newStatus = document.getElementById('f_status').value;
  if(!checkApprovalGate('paints', existing, newStatus)) return;
  let record = existing || {id: nextId('PT'), createdAt: Date.now(), approvalStatus:'بانتظار الاعتماد'};
  Object.assign(record, {
    itemDesc, date, linkedOrder: document.getElementById('f_linkedOrder').value,
    supplier: document.getElementById('f_supplier').value, driver: document.getElementById('f_driver').value,
    totalWeightKg: document.getElementById('f_totalWeightKg').value, paintPricePerKg: document.getElementById('f_paintPricePerKg').value,
    status: document.getElementById('f_status').value, notes: document.getElementById('f_notes').value,
  });
  if(!editingId) STATE.paints.push(record);
  await storeSet('paints', STATE.paints);
  closeModal(); showToast(editingId?'تم حفظ التعديلات':'تم إصدار إذن الدهان '+record.id); render();
}

function renderStock(){
  const c=document.getElementById('content');
  const agg = aggregateDemand();
  Object.keys(STATE.stock).forEach(name=>{ if(!agg[name]) agg[name] = {name, unit:STATE.stock[name].unit||'قطعة', needed:0, onHand:STATE.stock[name].onHand||0, shortfall:0}; });
  const rows = Object.values(agg).sort((a,b)=> b.shortfall-a.shortfall || a.name.localeCompare(b.name,'ar'));
  if(!rows.length){
    c.innerHTML = `<div class="table-wrap"><div class="empty-state"><div class="big">📦</div><h4>لا توجد مستلزمات بعد</h4><p>ستظهر هنا تلقائيًا احتياجات كل أوامر التصنيع بمجرد إصدارها</p></div></div>`;
    return;
  }
  let thead='<tr><th>الصنف</th><th>الوحدة</th><th>المطلوب من الأوامر الحالية</th><th>الكمية بالمخزن</th><th>الفرق (نقص)</th><th></th></tr>';
  let tbody = rows.map(r=>{
    const shortColor = r.shortfall>0? 'var(--bad)':'var(--good)';
    return `<tr>
      <td>${r.name}</td><td>${r.unit||'—'}</td><td class="mono">${fmtNum(r.needed,0)}</td>
      <td><input type="number" value="${r.onHand}" style="width:90px;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:5px 8px;color:var(--text)" onchange="updateStockOnHand('${r.name.replace(/'/g,"\\'")}', this.value, '${(r.unit||'قطعة').replace(/'/g,"\\'")}')"></td>
      <td class="mono" style="color:${shortColor};font-weight:700">${fmtNum(r.shortfall,0)}</td>
      <td>${r.shortfall>0?`<button class="btn btn-accent btn-sm" onclick="requestPurchaseFor('${r.name.replace(/'/g,"\\'")}', ${r.shortfall}, '${(r.unit||'قطعة').replace(/'/g,"\\'")}')">🛒 طلب شراء</button>`:'<span style="color:var(--text-faint)">مكتفٍ</span>'}</td>
    </tr>`;
  }).join('');
  c.innerHTML = `<div class="info-note">الأرقام في عمود "المطلوب" مجمّعة تلقائيًا من قوائم مستلزمات كل أوامر التصنيع النشطة (غير الملغاة). حدّث عمود "الكمية بالمخزن" لمتابعة النقص.</div>
    <div class="table-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}
async function updateStockOnHand(name, value, unit){
  STATE.stock[name] = {onHand: Number(value)||0, unit};
  await storeSet('stock', STATE.stock);
  renderNav();
}
function requestPurchaseFor(name, qty, unit){
  currentView='purchases';
  openGenericForm('purchases', null, {itemName:name, qty, unit});
}

/* ============================================================
   GENERIC MODULE TABLE (purchases / supplies)

function renderGenericTable(m){
  const c = document.getElementById('content');
  let rows = STATE[m.key].slice().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  if(statusTerm) rows = rows.filter(r=>r.status===statusTerm);
  if(searchTerm){ const t=searchTerm.toLowerCase(); rows = rows.filter(r => Object.values(r).some(v => String(v||'').toLowerCase().includes(t))); }
  if(!rows.length){
    c.innerHTML = `<div class="table-wrap"><div class="empty-state"><div class="big">${m.icon}</div><h4>لا توجد سجلات ${m.label} بعد</h4><p>اضغط "+ إضافة" لإنشاء أول سجل</p></div></div>`;
    return;
  }
  let thead = '<tr>' + m.columns.map(col=>`<th>${col.label}</th>`).join('') + '<th></th></tr>';
  let tbody = rows.map(r=>{
    let tds = m.columns.map(col=>{
      let val;
      if(col.compute) val = fmtMoney(m.computeTotal(r));
      else val = r[col.key];
      if(col.key==='id') return `<td class="id-tag">${val}</td>`;
      if(col.key==='approvalStatus') return `<td>${approvalBadgeHtml(r)}</td>`;
      if(col.badge) return `<td>${statusBadgeHtml(r[col.key], m.statusColor)}</td>`;
      return `<td>${val===undefined||val===null||val===''?'<span style="color:var(--text-faint)">—</span>':val}</td>`;
    }).join('');
    let actions = `<div class="row-actions">
      <button class="btn btn-ghost btn-sm" title="اعتماد" onclick="event.stopPropagation();openApprovalModal('${m.key}','${r.id}')">🛡</button>
      ${m.printable?`<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();printGenericPermit('${m.key}','${r.id}')">🖨</button>`:''}
      <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();confirmDelete('${m.key}','${r.id}')">✕</button></div>`;
    return `<tr onclick="openGenericForm('${m.key}','${r.id}')">${tds}<td>${actions}</td></tr>`;
  }).join('');
  c.innerHTML = `<div class="table-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}
function openGenericForm(modKey, id, prefill){
  editingId = id||null;
  const m = MODULES[modKey];
  const record = id ? STATE[m.key].find(r=>r.id===id) : Object.assign({date:new Date().toISOString().slice(0,10)}, prefill||{});
  const fieldsHtml = m.fields.map(f=>{
    const val = record[f.key] ?? '';
    const reqMark = f.req ? '<span class="req"> *</span>' : '';
    let input;
    if(f.type==='select') input = `<select id="f_${f.key}">${['',...f.options].map(o=>`<option value="${o}" ${val===o?'selected':''}>${o||'—'}</option>`).join('')}</select>`;
    else if(f.type==='textarea') input = `<textarea id="f_${f.key}">${val}</textarea>`;
    else if(f.type==='ref'){
      const refMod = MODULES[f.ref];
      input = `<input id="f_${f.key}" list="dl_${f.key}" value="${val}" placeholder="اكتب أو اختر">
        <datalist id="dl_${f.key}">${STATE[refMod.key].map(r=>`<option value="${r.id}">${r.id} — ${r.itemName||''}</option>`).join('')}</datalist>`;
    } else input = `<input id="f_${f.key}" type="${f.type}" value="${val}">`;
    return `<div class="field ${f.full?'full':''}"><label>${f.label}${reqMark}</label>${input}</div>`;
  }).join('');
  const modal = `<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()">
    <div class="modal">
      <div class="modal-head"><h3>${id?'تعديل':'إصدار'} — ${m.label}</h3><button class="close-x" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        ${id?`<div class="info-note" style="margin-bottom:14px">حالة الاعتماد: ${approvalBadgeHtml(record)}${record.approvedBy?` — بواسطة ${record.approvedBy}`:''}</div>`:''}
        <div class="form-grid">${fieldsHtml}</div>
        ${m.computeTotal ? `<div class="computed-box" id="liveTotal" style="margin-top:14px"><span>الإجمالي المحسوب</span><b id="liveTotalVal">0 ج.م</b></div>`:''}
      </div>
      <div class="modal-foot">
        <button class="btn btn-accent" onclick="saveGenericForm('${modKey}')">${id?'حفظ التعديلات':'إصدار'}</button>
        ${id?`<button class="btn btn-ghost" onclick="openApprovalModal('${modKey}','${id}')">🛡 اعتماد</button>`:''}
        <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      </div>
    </div></div>`;
  document.getElementById('modalRoot').innerHTML = modal;
  if(m.computeTotal){
    const updateLive = () => { const tmp={}; m.fields.forEach(f=>{ const el=document.getElementById('f_'+f.key); if(el) tmp[f.key]=el.value; }); document.getElementById('liveTotalVal').textContent = fmtMoney(m.computeTotal(tmp)); };
    m.fields.forEach(f=>{ const el=document.getElementById('f_'+f.key); if(el) el.addEventListener('input', updateLive); });
    updateLive();
  }
}
async function saveGenericForm(modKey){
  const m = MODULES[modKey];
  const missing = m.fields.filter(f=>f.req && !document.getElementById('f_'+f.key).value.trim());
  if(missing.length){ showToast('برجاء تعبئة: '+missing.map(f=>f.label).join('، '), true); return; }
  const existing = editingId ? STATE[m.key].find(r=>r.id===editingId) : null;
  const statusEl = document.getElementById('f_status');
  if(statusEl && !checkApprovalGate(modKey, existing, statusEl.value)) return;
  let record = existing || {id: nextId(m.prefix), createdAt: Date.now(), approvalStatus:'بانتظار الاعتماد'};
  m.fields.forEach(f=>{ record[f.key] = document.getElementById('f_'+f.key).value; });
  if(!editingId) STATE[m.key].push(record);
  await storeSet(m.key, STATE[m.key]);
  closeModal(); showToast(editingId?'تم حفظ التعديلات':'تم الإصدار بنجاح — '+record.id); render();
}
function printGenericPermit(modKey, id){
  const m = MODULES[modKey]; const r = STATE[modKey].find(x=>x.id===id);
  let rowsHtml = m.fields.filter(f=>f.type!=='textarea').map(f=>`<div class="print-row"><span>${f.label}</span><span>${r[f.key]||'—'}</span></div>`).join('');
  const approvalRow = `<div class="print-row"><span>حالة الاعتماد</span><span>${approvalOf(r)}${r.approvedBy?' — '+r.approvedBy:''}</span></div>`;
  const notesHtml = r.notes ? `<div class="print-row" style="display:block"><span>ملاحظات</span><p style="margin:6px 0 0;font-weight:400">${r.notes}</p></div>` : '';
  const sheet = `<div class="print-sheet" style="width:520px;max-width:100%"><div class="ph"><h2>${m.label} — ${r.id}</h2><p>MEC · نظام إدارة التصنيع</p></div>
    <div class="pb">${rowsHtml}${approvalRow}${notesHtml}<div class="print-sign"><div>توقيع المسؤول</div><div>توقيع المستلم</div></div></div></div>`;
  const modal = `<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()">
    <div class="modal" style="width:auto;background:transparent;border:none">
      <div id="printArea">${sheet}</div>
      <div class="modal-foot" style="justify-content:center;background:var(--panel);border-radius:0 0 14px 14px;border:1px solid var(--line);border-top:none">
        <button class="btn btn-accent" onclick="window.print()">🖨 طباعة</button><button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>
      </div></div></div>`;
  document.getElementById('modalRoot').innerHTML = modal;
}

function closeModal(){ document.getElementById('modalRoot').innerHTML=''; editingId=null; }
function confirmDelete(modKey, id){
  const modal = `<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()">
    <div class="modal confirm-box">
      <div class="modal-head"><h3>تأكيد الحذف</h3><button class="close-x" onclick="closeModal()">✕</button></div>
      <div class="modal-body"><div style="font-size:34px;margin-bottom:10px">🗑</div><p style="color:var(--text-dim)">هل تريد حذف السجل <b class="mono" style="color:var(--text)">${id}</b>؟ لا يمكن التراجع عن هذا الإجراء.</p></div>
      <div class="modal-foot"><button class="btn btn-danger" onclick="doDelete('${modKey}','${id}')">حذف نهائي</button><button class="btn btn-ghost" onclick="closeModal()">تراجع</button></div>
    </div></div>`;
  document.getElementById('modalRoot').innerHTML = modal;
}
async function doDelete(modKey, id){
  STATE[modKey] = STATE[modKey].filter(r=>r.id!==id);
  await storeSet(modKey, STATE[modKey]);
  closeModal(); showToast('تم الحذف'); render();
}
function exportCSV(){
  let rows, headers, keys, filename;
  if(currentView==='orders'){
    rows = STATE.orders; filename='orders_export.csv';
    headers=['اسم العملية','عدد الأبواب','الارتفاع','العرض','نوع الموتور','وزن الباب','الحالة','التاريخ'];
    let csv='\uFEFF'+['id',...headers].join(',')+'\n';
    rows.forEach(r=>{ csv += [r.id, r.client, r.doorCount, r.height, r.width, r.motorType, r.calc?.doorWeight, r.status, r.date].map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')+'\n'; });
    downloadCSV(csv, filename); return;
  }
  if(currentView==='paints'){
    rows = STATE.paints; filename='paints_export.csv';
    let csv='\uFEFF'+['id','البيان','أمر مرتبط','الوزن','الحالة','التاريخ'].join(',')+'\n';
    rows.forEach(r=>{ csv += [r.id,r.itemDesc,r.linkedOrder,r.totalWeightKg,r.status,r.date].map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')+'\n'; });
    downloadCSV(csv, filename); return;
  }
  const m = MODULES[currentView]; if(!m) return;
  rows = STATE[m.key]; if(!rows.length){ showToast('لا توجد بيانات للتصدير', true); return; }
  headers = m.fields.map(f=>f.label); keys = m.fields.map(f=>f.key);
  let csv = '\uFEFF' + ['id',...headers].join(',') + '\n';
  rows.forEach(r=>{ csv += [r.id, ...keys.map(k=> '"'+String(r[k]||'').replace(/"/g,'""')+'"')].join(',') + '\n'; });
  downloadCSV(csv, m.key+'_export.csv');
}
function downloadCSV(csv, filename){
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url);
  showToast('تم تصدير الملف');
}
function showToast(msg, isError){
  const t = document.getElementById('toast'); t.textContent = msg;
  t.style.borderRightColor = isError ? 'var(--bad)' : 'var(--good)';
  t.classList.add('show'); clearTimeout(showToast._tm); showToast._tm = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ============================================================
   AUTHENTICATION — حساب واحد مشترك لكل الفريق
   ============================================================ */
const AUTH_SESSION_KEY = LS_PREFIX+'session';
const DEFAULT_CREDS = {username:'admin', password:'admin123'};
async function sha256Hex(text){
  try{
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    // بديل بسيط في حال عدم توفر SubtleCrypto (سياقات غير آمنة قديمة)
    let h=0; for(let i=0;i<text.length;i++){ h=((h<<5)-h+text.charCodeAt(i))|0; } return 'fb'+String(h);
  }
}
async function ensureAuthRecord(){
  let auth = await storeGet('auth', null);
  if(!auth){
    auth = {username: DEFAULT_CREDS.username, passwordHash: await sha256Hex(DEFAULT_CREDS.password)};
    await storeSet('auth', auth);
  }
  return auth;
}
function isLoggedIn(){ return localStorage.getItem(AUTH_SESSION_KEY)==='1'; }
async function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  const auth = await ensureAuthRecord();
  const hash = await sha256Hex(p);
  if(u===auth.username && hash===auth.passwordHash){
    localStorage.setItem(AUTH_SESSION_KEY,'1');
    errEl.textContent='';
    showAppShell();
  } else {
    errEl.textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة';
  }
}
function doLogout(){
  localStorage.removeItem(AUTH_SESSION_KEY);
  document.getElementById('appShell').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginUser').value=''; document.getElementById('loginPass').value='';
  const errEl=document.getElementById('loginErr'); if(errEl) errEl.textContent='';
}
function showAppShell(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='flex';
  render();
}
async function openChangePasswordModal(fromLoginScreen){
  const auth = await ensureAuthRecord();
  const modal = `<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()">
    <div class="modal" style="width:380px">
      <div class="modal-head"><h3>🔑 تغيير بيانات الدخول</h3><button class="close-x" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="info-note">${fromLoginScreen?'أدخل بيانات الدخول الحالية لتعيين بيانات جديدة.':''}</div>
        <div class="form-grid" style="margin-top:10px">
          <div class="field full"><label>اسم المستخدم الحالي<span class="req"> *</span></label><input id="cp_curUser" value="${fromLoginScreen?'':auth.username}"></div>
          <div class="field full"><label>كلمة المرور الحالية<span class="req"> *</span></label><input id="cp_curPass" type="password"></div>
          <div class="field full"><label>اسم المستخدم الجديد<span class="req"> *</span></label><input id="cp_newUser" value="${auth.username}"></div>
          <div class="field full"><label>كلمة المرور الجديدة<span class="req"> *</span></label><input id="cp_newPass" type="password"></div>
        </div>
        <div class="login-err" id="cpErr"></div>
      </div>
      <div class="modal-foot"><button class="btn btn-accent" onclick="submitChangePassword()">حفظ</button><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button></div>
    </div></div>`;
  document.getElementById('modalRoot').innerHTML = modal;
}
async function submitChangePassword(){
  const auth = await ensureAuthRecord();
  const curUser = document.getElementById('cp_curUser').value.trim();
  const curPass = document.getElementById('cp_curPass').value;
  const newUser = document.getElementById('cp_newUser').value.trim();
  const newPass = document.getElementById('cp_newPass').value;
  const errEl = document.getElementById('cpErr');
  if(!curUser || !curPass || !newUser || !newPass){ errEl.textContent='برجاء تعبئة كل الحقول'; return; }
  const curHash = await sha256Hex(curPass);
  if(curUser!==auth.username || curHash!==auth.passwordHash){ errEl.textContent='بيانات الدخول الحالية غير صحيحة'; return; }
  const newAuth = {username:newUser, passwordHash: await sha256Hex(newPass)};
  await storeSet('auth', newAuth);
  closeModal(); showToast('تم تحديث بيانات الدخول بنجاح');
}

  await ensureAuthRecord();

})();
